<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Seite blockiert | FocusMode</title>
    <style>
      :root {
        --bg: #fafafa;
        --surface: #ffffff;
        --line: #ececec;
        --line-strong: #d4d4d8;
        --text: #111113;
        --muted: #6b7280;
        --accent: #111113;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                     "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .card {
        max-width: 440px;
        width: calc(100% - 32px);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 36px 32px;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 14px;
      }

      h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 10px;
      }

      p {
        margin: 0 0 8px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 14px;
      }

      .divider {
        height: 1px;
        background: var(--line);
        margin: 22px 0;
      }

      .tip {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.55;
      }

      button {
        margin-top: 22px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 500;
        background: var(--accent);
        color: var(--surface);
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.88; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">FocusMode</div>
      <h1>Diese Seite ist blockiert.</h1>
      <p>Du hast diese Domain in FocusMode hinzugefügt.</p>
      <p>Nutze die Zeit für deine wichtigste Aufgabe.</p>
      <div class="divider"></div>
      <div class="tip">Im Popup kannst du Seiten verwalten, störende Elemente verstecken und deine Fokuszeit auswerten.</div>
      <button id="backBtn">Zurück zur letzten Seite</button>
    </main>
    <script>
      document.getElementById("backBtn").addEventListener("click", () => {
        history.back();
      });
    </script>
  </body>
</html>
